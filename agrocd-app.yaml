apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agrocd-app
spec:
  project: default
  source:
    repoURL: https://github.com/jam1333/agrocd-test
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
